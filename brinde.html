<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Imperial Brindes — Catálogo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Barlow+Condensed:wght@500;600;700;800&display=swap');

    :root {
      --blue:        #2d82bb;
      --blue-dark:   #1a5c8a;
      --blue-deeper: #134468;
      --blue-light:  #e4f2fb;
      --blue-mid:    #5aaad8;
      --gold:        #f5bc2f;
      --gold-dark:   #c9980f;
      --gold-light:  #fdf5da;
      --gold-mid:    #f9d06a;
      --bg:          #eef2f7;
      --surface:     #ffffff;
      --surface-2:   #f7f9fc;
      --border:      #dae2ee;
      --border-dark: #bfcce0;
      --text:        #0f1e30;
      --text-2:      #3d5166;
      --text-3:      #8496aa;
      --radius:      14px;
      --radius-sm:   9px;
      --radius-pill: 100px;
      --shadow-xs:   0 1px 2px rgba(15,40,80,.06);
      --shadow-sm:   0 2px 6px rgba(15,40,80,.08), 0 1px 2px rgba(15,40,80,.04);
      --shadow-md:   0 6px 20px rgba(15,40,80,.11), 0 2px 6px rgba(15,40,80,.06);
      --shadow-lg:   0 12px 36px rgba(15,40,80,.14), 0 4px 10px rgba(15,40,80,.07);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ══════════════════════════════
       HEADER
    ══════════════════════════════ */
    header {
      background: linear-gradient(135deg, var(--blue-deeper) 0%, var(--blue-dark) 60%, #1f6e9c 100%);
      border-bottom: 3px solid var(--gold);
      padding: 0 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 3px 18px rgba(0,0,0,.22);
    }

    .header-inner {
      max-width: 1040px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
      gap: 2rem;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .logo-wrap img {
      height: 44px;
      width: auto;
      display: block;
    }

    /* Search */
    .search-wrap {
      flex: 1;
      max-width: 400px;
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,.5);
      pointer-events: none;
      display: flex;
    }

    #searchInput {
      width: 100%;
      height: 42px;
      padding: 0 1.1rem 0 2.7rem;
      border: 1.5px solid rgba(255,255,255,.18);
      border-radius: var(--radius-pill);
      background: rgba(255,255,255,.10);
      backdrop-filter: blur(6px);
      font-family: 'Inter', sans-serif;
      font-size: .875rem;
      color: #fff;
      outline: none;
      transition: border-color .2s, background .2s, box-shadow .2s;
      letter-spacing: .01em;
    }

    #searchInput::placeholder { color: rgba(255,255,255,.42); }

    #searchInput:focus {
      border-color: var(--gold);
      background: rgba(255,255,255,.16);
      box-shadow: 0 0 0 3px rgba(245,188,47,.25);
    }

    /* Header right slot */
    .header-tag {
      flex-shrink: 0;
      background: rgba(245,188,47,.15);
      border: 1px solid rgba(245,188,47,.35);
      color: var(--gold-mid);
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: var(--radius-pill);
    }

    /* ══════════════════════════════
       HERO BAND (thin accent strip)
    ══════════════════════════════ */
    .hero-band {
      background: linear-gradient(90deg, var(--blue-dark) 0%, var(--blue) 100%);
      padding: .65rem 2rem;
    }

    .hero-band-inner {
      max-width: 1040px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .hero-band p {
      font-size: .78rem;
      color: rgba(255,255,255,.65);
      letter-spacing: .02em;
    }

    .hero-band strong { color: rgba(255,255,255,.92); font-weight: 600; }

    /* ══════════════════════════════
       MAIN
    ══════════════════════════════ */
    main {
      max-width: 1040px;
      margin: 0 auto;
      padding: 2.2rem 2rem 5rem;
    }

    /* ── META BAR ── */
    .meta-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.4rem;
    }

    .meta-left {
      display: flex;
      align-items: center;
      gap: .75rem;
    }

    .meta-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: .02em;
      color: var(--blue-deeper);
      text-transform: uppercase;
    }

    .meta-divider {
      width: 1px;
      height: 18px;
      background: var(--border-dark);
      border-radius: 1px;
    }

    .meta-sub {
      font-size: .78rem;
      color: var(--text-3);
      font-weight: 400;
    }

    .counter-badge {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      background: var(--surface);
      color: var(--blue-dark);
      font-size: .775rem;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: var(--radius-pill);
      border: 1.5px solid var(--border-dark);
      box-shadow: var(--shadow-xs);
      letter-spacing: .01em;
    }

    .counter-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--gold);
      flex-shrink: 0;
    }

    /* ══════════════════════════════
       GRID
    ══════════════════════════════ */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 10px;
    }

    /* ══════════════════════════════
       CARD
    ══════════════════════════════ */
    .card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: .9rem 1rem .9rem 1rem;
      display: flex;
      align-items: center;
      gap: .85rem;
      transition: transform .17s ease, box-shadow .17s ease, border-color .17s ease;
      animation: fadeUp .3s ease both;
      position: relative;
      overflow: hidden;
    }

    /* subtle left accent bar */
    .card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: transparent;
      border-radius: 3px 0 0 3px;
      transition: background .17s;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      border-color: #a8ccec;
    }

    .card:hover::before {
      background: var(--gold);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-icon {
      width: 38px;
      height: 38px;
      background: var(--blue-light);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 1.1rem;
      transition: background .17s, transform .17s;
    }

    .card:hover .card-icon {
      background: #cce2f5;
      transform: scale(1.06);
    }

    .card-name {
      flex: 1;
      font-size: .84rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: .015em;
      line-height: 1.3;
    }

    /* ══════════════════════════════
       COPY BUTTON
    ══════════════════════════════ */
    .btn-copy {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: .32rem;
      height: 32px;
      padding: 0 12px;
      border: 1.5px solid var(--border-dark);
      border-radius: var(--radius-pill);
      background: var(--surface-2);
      color: var(--text-3);
      font-family: 'Inter', sans-serif;
      font-size: .74rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .17s ease;
      white-space: nowrap;
      outline: none;
      letter-spacing: .02em;
    }

    .btn-copy:hover {
      border-color: var(--blue);
      color: var(--blue-dark);
      background: var(--blue-light);
      box-shadow: 0 2px 8px rgba(45,130,187,.18);
    }

    .btn-copy:active { transform: scale(.95); }

    .btn-copy.copied {
      border-color: var(--gold-dark);
      color: var(--gold-dark);
      background: var(--gold-light);
      box-shadow: 0 2px 8px rgba(200,150,10,.14);
    }

    /* ══════════════════════════════
       EMPTY STATE
    ══════════════════════════════ */
    .empty-state {
      text-align: center;
      padding: 5rem 2rem;
      display: none;
    }
    .empty-state.visible { display: block; }

    .empty-icon-wrap {
      width: 64px;
      height: 64px;
      background: var(--blue-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.1rem;
      font-size: 1.7rem;
    }

    .empty-state h3 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--blue-dark);
      letter-spacing: .03em;
      text-transform: uppercase;
      margin-bottom: .4rem;
    }
    .empty-state p { font-size: .84rem; color: var(--text-3); }

    /* ══════════════════════════════
       TOAST
    ══════════════════════════════ */
    #toast {
      position: fixed;
      bottom: 1.75rem;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--blue-deeper);
      color: #fff;
      font-size: .82rem;
      font-weight: 500;
      padding: 11px 22px 11px 18px;
      border-radius: var(--radius-pill);
      border-left: 4px solid var(--gold);
      pointer-events: none;
      opacity: 0;
      transition: opacity .22s, transform .22s;
      z-index: 9999;
      white-space: nowrap;
      box-shadow: 0 6px 24px rgba(0,0,0,.22);
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .toast-icon {
      width: 20px; height: 20px;
      background: var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--blue-deeper);
      font-size: .7rem;
      font-weight: 700;
    }

    /* ══════════════════════════════
       FOOTER
    ══════════════════════════════ */
    footer {
      text-align: center;
      padding: 1.25rem 2rem;
      font-size: .73rem;
      color: var(--text-3);
      border-top: 1px solid var(--border);
      background: var(--surface);
      letter-spacing: .02em;
    }

    footer span {
      color: var(--blue);
      font-weight: 600;
    }

    /* ══════════════════════════════
       RESPONSIVE
    ══════════════════════════════ */
    @media (max-width: 680px) {
      .header-inner { height: 60px; gap: 1rem; }
      .logo-wrap img { height: 34px; }
      .header-tag { display: none; }
      .hero-band { display: none; }
      main { padding: 1.5rem 1rem 3rem; }
      .grid { grid-template-columns: 1fr; gap: 8px; }
      .meta-title { font-size: 1.1rem; }
      .meta-sub { display: none; }
      .meta-divider { display: none; }
    }
  </style>
</head>

    { name: "HEADSET",                      emoji: "🎙️" },
    { name: "SUPORTE DE CELULAR PRA CARRO", emoji: "📱" },
    { name: "SACOCHILA",                    emoji: "🎒" },
    { name: "BOLSA TERMICA",                emoji: "🧳" },
    { name: "LIXOCAR",                      emoji: "🗑️" },
    { name: "CHAVEIRO",                     emoji: "🗝️" },
    { name: "GARRAFA DE PLASTICO",          emoji: "💧" },
  ];

  const grid      = document.getElementById('grid');
  const input     = document.getElementById('searchInput');
  const counter   = document.getElementById('counter');
  const empty     = document.getElementById('emptyState');
  const toast     = document.getElementById('toast');
  const toastMsg  = document.getElementById('toastMsg');
  let toastTimer  = null;

  function showToast(name) {
    toastMsg.textContent = name + ' copiado!';
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2400);
  }

  function iconSVG() {
    return `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
  }
  function checkSVG() {
    return `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
  }

  function copyText(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      btn.querySelector('.btn-icon').innerHTML = checkSVG();
      btn.querySelector('.btn-label').textContent = 'Copiado!';
      btn.classList.add('copied');
      showToast(text);
      setTimeout(() => {
        btn.querySelector('.btn-icon').innerHTML = iconSVG();
        btn.querySelector('.btn-label').textContent = 'Copiar';
        btn.classList.remove('copied');
      }, 1500);
    });
  }

  function makeCard(item, i) {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${i * 0.036}s`;
    card.innerHTML = `
      <div class="card-icon">${item.emoji}</div>
      <span class="card-name">${item.name}</span>
      <button class="btn-copy" aria-label="Copiar ${item.name}">
        <span class="btn-icon">${iconSVG()}</span>
        <span class="btn-label">Copiar</span>
      </button>`;
    card.querySelector('.btn-copy').addEventListener('click', function() {
      copyText(item.name, this);
    });
    return card;
  }

  function render(q = '') {
    const query = q.trim().toLowerCase();
    const list  = query ? ITEMS.filter(i => i.name.toLowerCase().includes(query)) : ITEMS;
    grid.innerHTML = '';
    list.forEach((item, i) => grid.appendChild(makeCard(item, i)));
    const n = list.length;
    counter.textContent = `${n} ${n === 1 ? 'item' : 'itens'}`;
    empty.classList.toggle('visible', n === 0);
  }

  input.addEventListener('input', e => render(e.target.value));
  render();
</script>
</body>
</html>
